version: "3.9"

services:
  db:
    image: postgres:15
    container_name: vizion_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: vizion
      POSTGRES_PASSWORD: vizion
      POSTGRES_DB: vizion
    ports:
      - "5432:5432"
    volumes:
      - vizion_pgdata:/var/lib/postgresql/data

volumes:
  vizion_pgdata:
